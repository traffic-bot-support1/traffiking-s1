name: TraffiKing Fork 1

on:
  schedule:
    # Offset by +3 hours from main
    # Times: 3 AM, 11 AM, 7 PM UTC
    - cron: '0 3,11,19 * * *'
  workflow_dispatch:
  
jobs:
  traffic-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run TraffiKing Bot
        env:
          BLOG_URL: 'https://allai-info.blogspot.com'
          ACCOUNT_NAME: 'FORK-1'
          SESSIONS: '10'
          PAGES_PER_SESSION: '3'
          MIN_READ_TIME: '20'
          MAX_READ_TIME: '45'
          AD_CLICK_CHANCE: '35'
        run: |
          echo "🚀 Starting TraffiKing - Fork Account 1"
          node .github/scripts/traffic-bot.js
      
      - name: Summary
        if: always()
        run: echo "✅ Fork 1 session completed"
