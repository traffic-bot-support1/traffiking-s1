name: TraffiKing Auto Traffic Bot

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Manual trigger
  
jobs:
  generate-traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run Traffic Bot
        env:
          BLOG_URL: ${{ secrets.BLOG_URL || 'https://allai-info.blogspot.com' }}
          SESSIONS: ${{ secrets.SESSIONS || '20' }}
          PAGES_PER_SESSION: ${{ secrets.PAGES_PER_SESSION || '4' }}
        run: node .github/scripts/traffic-bot.js
