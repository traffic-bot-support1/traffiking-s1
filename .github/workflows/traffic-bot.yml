name: TraffiKing - GitHub Actions Bot

on:
  schedule:
    # Run 3 times per day (every 8 hours) - Conservative
    - cron: '0 0,8,16 * * *'  # 12 AM, 8 AM, 4 PM UTC
  workflow_dispatch: # Manual trigger
  
jobs:
  generate-traffic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run Traffic Bot (GitHub Mode)
        env:
          BLOG_URL: ${{ secrets.BLOG_URL || 'https://allai-info.blogspot.com' }}
          PLATFORM: 'github'
          SESSIONS: '12'  # Conservative for GitHub
          PAGES_PER_SESSION: '3'
          MIN_READ_TIME: '15'
          MAX_READ_TIME: '40'
          AD_CLICK_CHANCE: '35'
        run: node .github/scripts/traffic-bot.js
      
      - name: Summary
        if: always()
        run: |
          echo "✅ GitHub Actions bot completed"
          echo "Platform: GitHub Actions"
          echo "Estimated time: 12-15 minutes"
