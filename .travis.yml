language: node_js
node_js:
  - '18'

# Only run on cron schedule (not on every commit)
if: type = cron

# Operating system
os: linux
dist: focal

# Environment variables - AGGRESSIVE MODE for Travis
env:
  global:
    - BLOG_URL=https://allai-info.blogspot.com
    - PLATFORM=travis
    - SESSIONS=35           # More aggressive on Travis
    - PAGES_PER_SESSION=5
    - MIN_READ_TIME=20
    - MAX_READ_TIME=60
    - AD_CLICK_CHANCE=45

# Cache Node modules (optional, speeds up builds)
cache:
  directories:
    - node_modules

# No dependencies to install
install: skip

# Before running the bot
before_script:
  - echo "🚀 TraffiKing starting on Travis CI"
  - echo "📅 Build #$TRAVIS_BUILD_NUMBER"
  - echo "🌿 Branch $TRAVIS_BRANCH"
  - echo "⏰ Started at $(date)"
  - node --version

# Run the traffic bot
script:
  - node .github/scripts/traffic-bot.js

# After success
after_success:
  - echo "✅ Traffic generation completed successfully!"
  - echo "⏰ Completed at $(date)"

# After failure
after_failure:
  - echo "❌ Build failed - Check logs above"

# Notifications
notifications:
  email:
    on_success: never    # Don't email on success
    on_failure: change   # Email only when it starts failing

# Build stages (optional - for organization)
stages:
  - name: traffic_generation
    if: type = cron

jobs:
  include:
    - stage: traffic_generation
      name: "TraffiKing Traffic Bot"
      script:
        - node .github/scripts/traffic-bot.js
